<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>creca</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #1a1a1a;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      display: flex;
      justify-content: flex-end;
      padding: 20px 24px 0;
    }

    .btn-saved {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: #888;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      transition: color 0.2s;
    }

    .btn-saved:hover { color: #aaa; }

    .btn-saved svg {
      flex-shrink: 0;
    }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px;
      padding-top: 80px;
    }

    /* Logo */
    .logo {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 64px;
      letter-spacing: -1px;
      color: #4a9eff;
      margin-bottom: 48px;
      line-height: 1;
    }

    /* Search bar */
    .search-wrap {
      width: 100%;
      max-width: 720px;
      position: relative;
      margin-bottom: 48px;
    }

    .search-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: #252525;
      border: 1.5px solid #333;
      border-radius: 50px;
      padding: 18px 24px 18px 54px;
      font-size: 16px;
      color: #ccc;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .search-input::placeholder { color: #666; }

    .search-input:focus {
      border-color: #4a9eff;
      background: #2a2a2a;
    }

    /* Recent stores */
    .recent {
      text-align: center;
      width: 100%;
      max-width: 720px;
    }

    .recent-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 16px;
      letter-spacing: 0.02em;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .chip {
      border: 1.5px solid #3a3a3a;
      border-radius: 50px;
      padding: 9px 22px;
      font-size: 14px;
      color: #999;
      background: none;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.2s, color 0.2s;
    }

    .chip:hover {
      border-color: #555;
      color: #ccc;
    }

    /* ── Footer ── */
    footer {
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .data-updated {
      font-size: 11px;
      color: #555;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .footer-links {
      display: flex;
      gap: 24px;
    }

    .footer-links a {
      color: #666;
      text-decoration: underline;
      font-size: 13px;
      text-underline-offset: 3px;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: #999; }
  </style>
</head>
<body>

  <header>
    <button class="btn-saved">
      <!-- card icon -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="5" width="20" height="14" rx="2"/>
        <line x1="2" y1="10" x2="22" y2="10"/>
      </svg>
      保有決済
    </button>
  </header>

  <main>
    <h1 class="logo">creca</h1>

    <div class="search-wrap">
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search-input" type="text" placeholder="お店の名前を検索...">
    </div>

    <div class="recent">
      <p class="recent-label">最近使った店</p>
      <div class="chips">
        <button class="chip">スターバックス</button>
        <button class="chip">マクドナルド</button>
        <button class="chip">セブン-イレブン</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <span id="toast-icon">✅</span>
    <span id="toast-message" class="font-bold text-sm tracking-wide"></span>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, signOut, GoogleAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, onSnapshot, query, addDoc, serverTimestamp, where } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // 1. Firebase構成の取得（自動 & グローバル変数のハイブリッド）
    async function loadFirebase() {
      // 以前の環境で使われていたグローバル変数があれば優先
      if (typeof __firebase_config !== 'undefined' && __firebase_config) {
        try {
          return typeof __firebase_config === 'string' ? JSON.parse(__firebase_config) : __firebase_config;
        } catch(e) { console.error("JSON parse failed for __firebase_config"); }
      }

      // なければ Hosting の自動設定を取得
      try {
        const response = await fetch('/__/firebase/init.json');
        if (response.ok) return await response.json();
      } catch (e) {
        console.warn("Firebase auto-init failed, checking fallbacks...");
      }

      // 最終手段：プロジェクトIDからの推測（API Keyは本来自動取得されるべき）
      return {
        apiKey: "", 
        authDomain: "growth-point-app-2026.firebaseapp.com",
        projectId: "growth-point-app-2026",
        storageBucket: "growth-point-app-2026.firebasestorage.app"
      };
    }

    const firebaseConfig = await loadFirebase();
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    let currentUser = null;
    let userData = { points: 0, streak: 0, level: 1, todayMinutes: 0 };

    const showToast = (msg, icon = '✅') => {
      const t = document.getElementById('toast');
      if(t) {
        document.getElementById('toast-message').textContent = msg;
        document.getElementById('toast-icon').textContent = icon;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
      }
    };

    const closeModal = (id) => {
      document.getElementById(id).classList.remove('active');
    };
    
    window.closeModal = closeModal;

    const updateUI = () => {
      const p = userData.points || 0;
      document.getElementById('nav-total-points').textContent = p.toLocaleString();
      document.getElementById('stat-points').textContent = p.toLocaleString();
      document.getElementById('stat-streak').textContent = userData.streak || 0;
      document.getElementById('stat-today-minutes').textContent = userData.todayMinutes || 0;
      
      const level = Math.floor(p / 100) + 1;
      document.getElementById('stat-level').textContent = `Lv.${level}`;
      
      const progress = p % 100;
      document.getElementById('level-progress').style.width = `${progress}%`;
      document.getElementById('level-progress-text').textContent = `NEXT: ${100 - progress} PT`;
    };

    let myChart = null;
    const initChart = (history = [30, 45, 20, 60, 40, 90, 30]) => {
      const ctx = document.getElementById('weekly-chart');
      if (myChart) myChart.destroy();
      myChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
          datasets: [{
            data: history,
            backgroundColor: '#6366f1',
            borderRadius: 12,
            borderSkipped: false,
            barThickness: 16
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, border: { display: false }, ticks: { font: { weight: '600', size: 10 } } },
            y: { beginAtZero: true, grid: { color: '#f1f5f9' }, border: { display: false }, ticks: { display: false } }
          }
        }
      });
    };

    async function verifyStudyImage(base64Data, topic) {
      if (!apiKey) return { isStudy: true, confidence: 0.9, topicDetected: topic, message: "Demo Mode: AI verification skipped." };
      
      const prompt = `Learning Verification AI: Analyze this image for proof of studying ${topic}. Return JSON: {isStudy:bool, confidence:number, message:string}`;
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
      
      try {
        const res = await fetch(url, {
          method: 'POST',
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64Data.split(',')[1] } }] }]
          })
        });
        const json = await res.json();
        return JSON.parse(json.candidates[0].content.parts[0].text);
      } catch (err) {
        return { isStudy: true, confidence: 0.5, message: "Effort appreciated!" };
      }
    }

    const initApp = async (method = 'auto') => {
      try {
        if (method === 'google') {
          await signInWithPopup(auth, googleProvider);
        } else if (method === 'demo') {
          await signInAnonymously(auth);
        }
      } catch (e) {
        console.error("Auth Error:", e);
        const errorMsg = e.code === 'auth/popup-blocked' ? "ポップアップがブロックされました" : "認証失敗: " + e.code;
        showToast(errorMsg, "❌");
      }
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        const root = document.getElementById('app');
        document.getElementById('login-screen').style.display = 'none';
        root.classList.remove('hidden');
        setTimeout(() => root.classList.remove('opacity-0'), 100);
        
        // Align with firestore.rules (/profiles/{userId})
        const userDocRef = doc(db, 'profiles', user.uid);
        const snap = await getDoc(userDocRef);
        
        if (snap.exists()) {
          const data = snap.data();
          userData.points = data.total_points || 0;
          userData.streak = data.streak || 0;
          userData.todayMinutes = data.todayMinutes || 0;
        } else {
          // Initialize profile with required fields for validation
          await setDoc(userDocRef, {
            total_points: 0,
            display_name: user.displayName || "User",
            streak: 0,
            todayMinutes: 0
          });
        }
        
        updateUI();
        initChart();
        loadActivities();
      } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('app').classList.add('hidden');
      }
    });

    const saveActivity = async (type, val, msg) => {
      if (!currentUser) return;
      
      // Save to study_logs (/study_logs/{logId})
      const logRef = collection(db, 'study_logs');
      await addDoc(logRef, {
        user_id: currentUser.uid,
        type, 
        value: val, 
        message: msg, 
        timestamp: serverTimestamp()
      });
      
      userData.points += val;
      if (type === 'study') userData.todayMinutes += parseInt(document.getElementById('study-duration').value);
      
      // Update Profile using allowed path and field names
      const userDocRef = doc(db, 'profiles', currentUser.uid);
      await updateDoc(userDocRef, {
        total_points: userData.points,
        todayMinutes: userData.todayMinutes,
        display_name: currentUser.displayName || "User"
      });
      updateUI();
    };

    const loadActivities = () => {
      // Load from /study_logs where user_id matches
      const q = query(collection(db, 'study_logs'), where("user_id", "==", currentUser.uid));
      onSnapshot(q, (snapshot) => {
        const list = document.getElementById('activity-list');
        list.innerHTML = '';
        const docs = snapshot.docs.sort((a, b) => b.data().timestamp?.seconds - a.data().timestamp?.seconds).slice(0, 5);
        
        docs.forEach(d => {
          const data = d.data();
          const item = document.createElement('div');
          item.className = 'bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-100 hover:border-indigo-200 transition-all';
          item.innerHTML = `
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 rounded-xl bg-slate-50 flex items-center justify-center text-xl shadow-inner">${data.type === 'study' ? '📖' : '🌅'}</div>
              <div>
                <div class="font-bold text-sm text-slate-800">${data.message}</div>
                <div class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">${data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleTimeString() : 'Just now'}</div>
              </div>
            </div>
            <div class="text-indigo-600 font-extrabold text-sm tracking-tight">+${data.value}pt</div>
          `;
          list.appendChild(item);
        });
      });
    };

    // UI Listeners
    document.getElementById('btn-login').onclick = () => initApp('google');
    document.getElementById('btn-demo').onclick = () => initApp('demo');

    document.getElementById('action-morning').onclick = () => document.getElementById('modal-morning').classList.add('active');
    document.getElementById('action-study').onclick = () => document.getElementById('modal-study').classList.add('active');
    document.getElementById('fab-record').onclick = () => document.getElementById('modal-study').classList.add('active');

    document.getElementById('btn-morning-submit').onclick = async (e) => {
      const btn = e.target;
      btn.disabled = true;
      const time = document.getElementById('wake-up-time').value;
      const hour = parseInt(time.split(':')[0]);
      const bonus = hour < 7 ? 15 : 5;
      
      await saveActivity('morning', bonus, `${time} Check-in`);
      showToast(`${bonus} PT EARNED!`, '🌅');
      closeModal('modal-morning');
      btn.disabled = false;
    };

    const fileInput = document.getElementById('study-image');
    document.getElementById('upload-area').onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (re) => {
          document.getElementById('upload-preview').classList.remove('hidden');
          document.getElementById('preview-img').src = re.target.result;
        };
        reader.readAsDataURL(file);
      }
    };

    document.getElementById('btn-study-submit').onclick = async (e) => {
      const btn = e.target;
      const iris = document.getElementById('iris-scan');
      const duration = document.getElementById('study-duration').value;
      const topic = document.getElementById('study-topic').value;
      const previewImg = document.getElementById('preview-img').src;

      if (!previewImg || previewImg.includes('index.html')) {
        showToast('Capture your proof!', '⚠️');
        return;
      }

      btn.disabled = true;
      iris.style.display = "block";

      const aiResult = await verifyStudyImage(previewImg, topic);
      
      iris.style.display = "none";
      btn.disabled = false;

      if (aiResult.isStudy) {
        const points = Math.floor(duration / 10) + 10;
        await saveActivity('study', points, `${topic} ${duration}min`);
        showToast(`AI VERIFIED! +${points}PT`, '✨');
        closeModal('modal-study');
      } else {
        showToast('AI could not verify content', '❌');
      }
    };

</body>
</html>
