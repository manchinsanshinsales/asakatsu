<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>creca</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #1a1a1a;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      display: flex;
      justify-content: flex-end;
      padding: 20px 24px 0;
    }

    .btn-saved {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: #888;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      transition: color 0.2s;
    }

    .btn-saved:hover { color: #aaa; }

    .btn-saved svg {
      flex-shrink: 0;
    }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px;
      padding-top: 80px;
    }

    /* Logo */
    .logo {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 64px;
      letter-spacing: -1px;
      color: #4a9eff;
      margin-bottom: 48px;
      line-height: 1;
    }

    /* Search bar */
    .search-wrap {
      width: 100%;
      max-width: 720px;
      position: relative;
      margin-bottom: 48px;
    }

    .search-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: #252525;
      border: 1.5px solid #333;
      border-radius: 50px;
      padding: 18px 24px 18px 54px;
      font-size: 16px;
      color: #ccc;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .search-input::placeholder { color: #666; }

    .search-input:focus {
      border-color: #4a9eff;
      background: #2a2a2a;
    }

    /* Recent stores */
    .recent {
      text-align: center;
      width: 100%;
      max-width: 720px;
    }

    .recent-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 16px;
      letter-spacing: 0.02em;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .chip {
      border: 1.5px solid #3a3a3a;
      border-radius: 50px;
      padding: 9px 22px;
      font-size: 14px;
      color: #999;
      background: none;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.2s, color 0.2s;
    }

    .chip:hover {
      border-color: #555;
      color: #ccc;
    }

    /* ── Footer ── */
    footer {
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .data-updated {
      font-size: 11px;
      color: #555;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .footer-links {
      display: flex;
      gap: 24px;
    }

    .footer-links a {
      color: #666;
      text-decoration: underline;
      font-size: 13px;
      text-underline-offset: 3px;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: #999; }
  </style>
</head>
<body>

  <header>
    <button class="btn-saved">
      <!-- card icon -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="5" width="20" height="14" rx="2"/>
        <line x1="2" y1="10" x2="22" y2="10"/>
      </svg>
      保有決済
    </button>
  </header>

  <main>
    <h1 class="logo">creca</h1>

    <div class="search-wrap">
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search-input" type="text" placeholder="お店の名前を検索...">
    </div>

    <div class="recent">
      <p class="recent-label">最近使った店</p>
      <div class="chips">
        <button class="chip">スターバックス</button>
        <button class="chip">マクドナルド</button>
        <button class="chip">セブン-イレブン</button>
      </div>
    </div>
  </main>

  <footer>
    <p class="data-updated">DATA UPDATED: 2024.05.20</p>
    <nav class="footer-links">
      <a href="#">使い方</a>
      <a href="#">対応決済一覧</a>
    </nav>
  </footer>

</body>
</html>
